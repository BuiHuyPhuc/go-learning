root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o tmp/main cmd/server/main.go"
  bin = "tmp/main"
  include_ext = ["go"]
  include_dir = ["cmd", "internal", "pkg"]
  exclude_dir = ["tmp", "vendor", "node_modules"]
  delay = 1000

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[watcher]
  poll = true
  poll_interval = 100

[log]
  time = true

[misc]
  clean_on_exit = true
