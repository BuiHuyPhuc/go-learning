root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o tmp/main.exe cmd/server/main.go"
  bin = "tmp/main.exe"
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor", "node_modules"]
  delay = 1000

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = true

[misc]
  clean_on_exit = true
